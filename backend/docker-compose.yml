version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sui-teaching-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sui_teaching
    ports:
      - "5433:5432"  # Using 5433 on host since 5432 is taken
    volumes:
      - sui_teaching_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sui-teaching-network
    restart: unless-stopped

volumes:
  sui_teaching_data:
    driver: local

networks:
  sui-teaching-network:
    driver: bridge
